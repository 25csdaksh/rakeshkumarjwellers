<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diamond Jewellery | Rakeshkumar Jewellers</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header -->
    <header class="header">
        <h1>Rakeshkumar Jewellers</h1>
        <p>Patan | Trusted Gold Jewellers</p>
        <nav>
            <a href="index.html#home">Home</a>
            <a href="index.html#collection">Collection</a>
            <a href="index.html#gallery">Gallery</a>
            <a href="index.html#about">About</a>
            <a href="index.html#rate">Gold Rate</a>
            <a href="appointment.html">Appointment</a>
            <a href="index.html#contact">Contact</a>
        </nav>
    </header>

    <section class="hero"
        style="min-height: 25vh; position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center;">
        <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
        <a href="index.html#collection" class="classy-back-btn">&larr; Back to Collections</a>
        <h2 style="font-size: 3.5em; letter-spacing: 2px; text-transform: uppercase;">Diamond Jewellery</h2>
        <p style="font-size: 1.2em; font-style: italic;">Sparkling Elegance</p>
    </section>

    <section class="gallery-section">
        <div class="grid">
            <div class="card" onclick="window.location.href='diamond-necklace.html'" style="cursor: pointer;">
                <img src="assets/diamond-necklace-main.jpg" alt="Diamond Necklace">
                <div class="container">
                    <h4><b>Diamond Necklace</b></h4>
                </div>
            </div>
            <div class="card" onclick="window.location.href='diamond-bracelets.html'" style="cursor: pointer;">
                <img src="assets/diamond-bracelets-main.jpg" alt="Diamond Bracelets">
                <div class="container">
                    <h4><b>Diamond Bracelets</b></h4>
                </div>
            </div>
            <div class="card" onclick="window.location.href='1diamond-jewellery.html'" style="cursor: pointer;">
                <img src="assets/1diamond-jewellery-main.jpg" alt="1 Diamond Jewellery">
                <div class="container">
                    <h4><b>1 Diamond Jewellery</b></h4>
                </div>
            </div>
            <!-- More categories like Diamond Rings, Earrings can be added here later -->
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Rakeshkumar Jewellers, Zaveri-bazar, soni-vado, Patan</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
